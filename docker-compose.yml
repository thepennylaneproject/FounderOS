services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: founderos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: founderos
      POSTGRES_USER: founderos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U founderos" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: founderos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes

  # Email Server
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: founderos-mail
    hostname: mail.${DOMAIN:-founderos.local}
    restart: unless-stopped
    ports:
      - "25:25" # SMTP
      - "143:143" # IMAP
      - "465:465" # SMTPS
      - "587:587" # Submission
      - "993:993" # IMAPS
    volumes:
      - ./email/data:/var/mail
      - ./email/state:/var/mail-state
      - ./email/config:/tmp/docker-mailserver
    environment:
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_CLAMAV=0
      - ENABLE_POSTGREY=0
      - SSL_TYPE=self-signed
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE

  # Unified FounderOS App (Next.js)
  app:
    build:
      context: .
      target: development
    container_name: founderos-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://founderos:${DB_PASSWORD:-changeme123}@postgres:5432/founderos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_to_random_string}
      SMTP_HOST: mailserver
      SMTP_PORT: 25
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailserver:
        condition: service_started
    volumes:
      - .:/app:cached
      - node_modules:/app/node_modules
      - /app/.next # Don't overwrite .next

volumes:
  node_modules:


networks:
  default:
    name: founderos-network
